name: Validate test vectors

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate vector files
        run: python scripts/validate.py

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install ajv-cli
        run: npm install -g ajv-cli ajv-formats

      - name: Validate codec vectors against schema
        run: |
          for f in transport/*/codec/**/*.json; do
            echo "Validating $f"
            ajv validate -s schema/codec-vector.schema.json -d "$f" --spec=draft2020 || exit 1
          done

      - name: Validate meta.json files against schema
        run: |
          for f in transport/*/meta.json; do
            echo "Validating $f"
            ajv validate -s schema/meta.schema.json -d "$f" --spec=draft2020 || exit 1
          done

      - name: Validate manifest.json against schema
        run: ajv validate -s schema/manifest.schema.json -d manifest.json --spec=draft2020
